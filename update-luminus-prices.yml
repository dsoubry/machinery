name: Update Belgian Day-Ahead Prices

on:
  schedule:
    - cron: '20 12 * * *'
    - cron: '35 13 * * *'
    - cron: '50 14 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

concurrency:
  group: update-belgian-day-ahead-prices
  cancel-in-progress: true

env:
  TZ: Europe/Brussels
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-prices:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests pandas python-dateutil

      - name: Sync with remote
        run: |
          git fetch origin main
          git pull --rebase origin main

      - name: Fetch day-ahead prices
        env:
          ENTSOE_TOKEN: ${{ secrets.ENTSOE_TOKEN }}
        run: |
          python scrape_entsoe.py

      - name: Generate HTML report
        run: |
          python generate_report.py

      - name: Commit and push if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A

          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Update day-ahead prices $(date -d 'tomorrow' +'%Y-%m-%d')"
          git push origin main

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: price-data
          path: |
            *.csv
            *.json
            index.html
          retention-days: 30
